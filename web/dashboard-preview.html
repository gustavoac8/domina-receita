// render nav
const navEl = document.getElementById('nav');
NAV.forEach((n, i) => {
  const a = document.createElement('a');
  a.className = 'nav-item flex items-center gap-2 rounded-lg px-3 py-2 cursor-pointer hover:bg-slate-800';
  a.dataset.page = n.id;
  a.innerHTML = `<span>${n.icon}</span>${n.label}`;
  a.onclick = () => show(n.id);
  navEl.appendChild(a);
});

function show(id) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === id));
  document.querySelectorAll('.page').forEach(el => el.classList.toggle('active', el.id === 'page-' + id));
}

const PAGES = document.getElementById('pages');
function page(id, html) {
  const d = document.createElement('div');
  d.id = 'page-' + id;
  d.className = 'page';
  d.innerHTML = html;
  PAGES.appendChild(d);
}
