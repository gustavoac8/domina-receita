const NAV = [
  { group:'Plataforma' },
  { id:'overview',    label:'Visão da plataforma',    icon:'📈', admin:true },
  { id:'clinicas',    label:'Clínicas ativas',         icon:'🏥', admin:true },
  { id:'mrr',         label:'Receita e MRR',           icon:'💰', admin:true },
  { id:'impersonate', label:'Impersonar médico',       icon:'👤', admin:true },

  { group:'Meu CRM (vendas do SaaS)' },
  { id:'leads',       label:'Leads (funil comercial)', icon:'🎯', admin:true },
  { id:'demos',       label:'Demos agendadas',         icon:'📅', admin:true },
  { id:'trials',      label:'Trials ativos',           icon:'🧪', admin:true },
  { id:'churn',       label:'Churn e risco',           icon:'⚠️', admin:true },

  { group:'Operação' },
  { id:'usuarios',    label:'Usuários e permissões',   icon:'🔑', admin:true },
  { id:'logs',        label:'Logs e auditoria',        icon:'📋', admin:true },
  { id:'flags',       label:'Feature flags',           icon:'🚩', admin:true },
  { id:'integracoes', label:'Integrações & API keys',  icon:'🔌', admin:true },
];

const navEl = document.getElementById('nav');
NAV.forEach(n => {
  if (n.group) {
    const h = document.createElement('div');
    h.className = 'text-xs uppercase tracking-wider text-slate-500 mt-5 mb-1 px-3';
    h.textContent = n.group;
    navEl.appendChild(h);
    return;
  }
  const a = document.createElement('a');
  a.className = 'nav-item admin flex items-center gap-2 rounded-lg px-3 py-2 cursor-pointer hover:bg-slate-800';
  a.dataset.page = n.id;
  a.innerHTML = `<span>${n.icon}</span>${n.label}`;
  a.onclick = () => show(n.id);
  navEl.appendChild(a);
});

function show(id) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === id));
  document.querySelectorAll('.page').forEach(el => el.classList.toggle('active', el.id === 'page-' + id));
}

const PAGES = document.getElementById('pages');
function page(id, html) {
  const d = document.createElement('div');
  d.id = 'page-' + id;
  d.className = 'page';
  d.innerHTML = html;
  PAGES.appendChild(d);
}
